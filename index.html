<!DOCTYPE html>
<html lang="es-CO" dir="ltr" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruaj | Sports Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght=300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00ff66; 
            --bg-dark: #0b0f19;      
            --card-bg: #161f30;      
            --text-light: #ffffff;
            --text-gray: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        header {
            background-color: rgba(22, 31, 48, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span { color: var(--primary-color); }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .cart-icon-container:hover {
            background: var(--primary-color);
            color: #000;
        }

        .cart-count {
            background: #ff3366;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            position: absolute;
            top: -5px;
            font-weight: bold;
            left: -5px;
        }

        .hero {
            height: 55vh;
            background: linear-gradient(rgba(11, 15, 25, 0.7), rgba(11, 15, 25, 0.9)), url('https://images.unsplash.com/photo-1517838277536-f5f99be501cd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 5px;
        }

        .hero h1 span { color: var(--primary-color); }

        .hero .subtitle {
            font-size: 14px;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .hero p {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            padding: 0 15px;
            border-left: 5px solid var(--primary-color);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 102, 0.1);
        }

        .product-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .product-info { padding: 20px; }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            height: 50px;
        }

        .product-price {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .stock-status {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .selector-group {
            margin-bottom: 15px;
        }

        .selector-group label {
            display: block;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .sizes, .colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .size-btn.active {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        .color-btn {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid #334155;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .color-btn.active {
            border-color: #ffffff;
            transform: scale(1.2);
            box-shadow: 0 0 8px var(--primary-color);
        }

        .btn-add {
            width: 100%;
            background-color: var(--primary-color);
            color: #0b0f19;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
        }

        .btn-add:disabled {
            background-color: #334155;
            color: var(--text-gray);
            cursor: not-allowed;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            width: 400px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
            right: -400px;
        }

        .cart-sidebar.open { right: 0; }

        .cart-header {
            padding: 20px;
            background-color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info { flex: 1; }

        .remove-item {
            background: none;
            border: none;
            color: #ff3366;
            cursor: pointer;
        }

        .cart-footer {
            padding: 20px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }

        .overlay.active { display: block; }

        @media (max-width: 450px) {
            .cart-sidebar { width: 100%; right: -100%; }
            .cart-sidebar.open { right: 0; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header>
        <div class="logo">RUAJ<span>.</span></div>
        <div class="nav-controls">
            <div class="cart-icon-container" onclick="toggleCart()">
                <span id="lblCartBtn">🛒 Carrito</span>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1 id="lblHeroTitle">Entrena con poder con <span>RUAJ</span></h1>
        <div class="subtitle">Desde 2018 bajo la gestión de Karina</div>
        <p id="lblHeroDesc">Ropa deportiva diseñada con la última tecnología para brindarte un alto rendimiento y comodidad absoluta.</p>
    </section>

    <main class="container">
        <h2 class="section-title" id="lblSectionTitle">Los Más Vendidos</h2>
        <div class="products-grid" id="productsContainer"></div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 id="lblCartHeader">Tu Carrito</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span id="lblTotalText">Total:</span>
                <span id="cartTotal">COP$ 0</span>
            </div>
            <button class="btn-checkout" id="lblCheckoutBtn" onclick="checkout()">Pedir por WhatsApp</button>
        </div>
    </div>

    <script>
        // رابط قاعدة بيانات Firebase الخاصة بكِ
        const FIREBASE_DB_URL = "https://sweet-store-5826f-default-rtdb.firebaseio.com/inventory.json";

        const labels = {
            lblSize: "Seleccionar Talla:",
            lblColor: "Seleccionar Color:",
            lblStock: "Disponibles en stock:",
            btnAdd: "Añadir al carrito",
            btnOut: "Agotado",
            currency: "COP$",
            msgMax: "Lo sentimos, has alcanzado el límite máximo disponible en stock para esta talla y color.",
            msgSuccess: "¡Redirigiendo a WhatsApp para enviar tu pedido!",
            msgEmpty: "¡El carrito está vacío!",
            lblItemSize: "Talla",
            lblItemColor: "Color",
            lblQty: "Cant",
            lblDelete: "Eliminar",
            whatsappHeader: "🛍️ *Nuevo Pedido - RUAJ Store* 🛍️\n\n*Productos solicitados:*\n",
            lblTotalMsg: "Total a pagar:"
        };

        const productsNames = [
            { id: 1, name: "Camiseta de Compresión Pro" },
            { id: 2, name: "Pantalón Deportivo Stretch" },
            { id: 3, name: "Chaqueta Rompevientos Deportiva" },
            { id: 4, name: "Tenis RUAJ Ultra Fitness" },
            { id: 5, name: "Pantalón Deportivo para Niños" }
        ];

        const defaultProductsConfig = {
            1: { price: 75000, image: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?auto=format&fit=crop&w=500&q=80", stock: 5, sizes: ["M", "L", "XL"], colors: [{nameEs: "Negro", hex: "#000000"}, {nameEs: "Azul", hex: "#0000ff"}] },
            2: { price: 105000, image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=500&q=80", stock: 3, sizes: ["S", "M", "L"], colors: [{nameEs: "Gris", hex: "#808080"}, {nameEs: "Negro", hex: "#000000"}] },
            3: { price: 145000, image: "https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&w=500&q=80", stock: 2, sizes: ["M", "L", "XXL"], colors: [{nameEs: "Rojo", hex: "#ff0000"}, {nameEs: "Verde Oliva", hex: "#556b2f"}] },
            4: { price: 195000, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80", stock: 4, sizes: ["41", "42", "43", "44"], colors: [{nameEs: "Rojo", hex: "#e60000"}, {nameEs: "Blanco", hex: "#ffffff"}] },
            5: { price: 15000, image: "https://mah11177a-jpg.github.io/sweet/pants3.jpeg.jpeg", stock: 8, sizes: ["2Y", "3Y", "4Y", "5Y"], colors: [{nameEs: "Gris Oscuro", hex: "#343a40"}] }
        };

        let baseProductsConfig = defaultProductsConfig;
        let cart = [];
        let selectedSizes = {};
        let selectedColors = {};

        async function fetchInventoryFromCloud() {
            try {
                const response = await fetch(FIREBASE_DB_URL);
                const data = await response.json();
                if (data) {
                    baseProductsConfig = data;
                } else {
                    await saveInventoryToCloud(defaultProductsConfig);
                }
            } catch (error) {
                console.error("Error fetching cloud data:", error);
            }
        }

        async function saveInventoryToCloud(config) {
            try {
                await fetch(FIREBASE_DB_URL, {
                    method: 'PUT',
                    body: JSON.stringify(config),
                    headers: { 'Content-Type': 'application/json' }
                });
            } catch (error) {
                console.error("Error saving cloud data:", error);
            }
        }

        function getCurrentProducts() {
            return productsNames.map(p => {
                return {
                    ...p,
                    ...baseProductsConfig[p.id]
                };
            });
        }

        function displayProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            const currentProducts = getCurrentProducts();

            currentProducts.forEach(product => {
                if (!selectedSizes[product.id]) {
                    selectedSizes[product.id] = product.sizes[0];
                }
                if (!selectedColors[product.id] && product.colors && product.colors.length > 0) {
                    selectedColors[product.id] = product.colors[0];
                }

                const isOutOfStock = product.stock === 0;

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${labels.currency} ${product.price.toLocaleString()}</div>
                        <div class="stock-status">${labels.lblStock} ${product.stock}</div>
                        
                        <div class="selector-group">
                            <label>${labels.lblSize}</label>
                            <div class="sizes">
                                ${product.sizes.map(size => `
                                    <button class="size-btn ${selectedSizes[product.id] === size ? 'active' : ''}" 
                                        onclick="selectSize(${product.id}, '${size}')">
                                        ${size}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <div class="selector-group">
                            <label>${labels.lblColor}</label>
                            <div class="colors">
                                ${product.colors.map((color, index) => `
                                    <button class="color-btn ${selectedColors[product.id]?.hex === color.hex ? 'active' : ''}" 
                                        style="background-color: ${color.hex};" 
                                        title="${color.nameEs}"
                                        onclick="selectColor(${product.id}, ${index})">
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <button class="btn-add" ${isOutOfStock ? 'disabled' : ''} onclick="addToCart(${product.id})">
                            ${isOutOfStock ? labels.btnOut : labels.btnAdd}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectSize(productId, size) {
            selectedSizes[productId] = size;
            displayProducts();
        }

        function selectColor(productId, colorIndex) {
            const currentProducts = getCurrentProducts();
            const product = currentProducts.find(p => p.id === productId);
            if (product && product.colors) {
                selectedColors[productId] = product.colors[colorIndex];
                displayProducts();
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(productId) {
            const currentProducts = getCurrentProducts();
            const product = currentProducts.find(p => p.id === productId);
            const size = selectedSizes[productId];
            const color = selectedColors[productId];

            if (product && product.stock > 0) {
                const existingItem = cart.find(item => item.id === productId && item.size === size && item.color.hex === color.hex);

                if (existingItem) {
                    if (existingItem.quantity < product.stock) {
                        existingItem.quantity++;
                    } else {
                        alert(labels.msgMax);
                        return;
                    }
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        image: product.image,
                        size: size,
                        color: color,
                        quantity: 1
                    });
                }
                updateCartUI();
            }
        }

        function removeFromCart(productId, size, colorHex) {
            cart = cart.filter(item => !(item.id === productId && item.size === size && item.color.hex === colorHex));
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cartItemsContainer');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');

            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalItems = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                totalItems += item.quantity;

                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                itemElement.innerHTML = `
                    <img src="${item.image}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-meta">
                            ${labels.lblItemSize}: ${item.size} | ${labels.lblItemColor}: ${item.color.nameEs} | ${labels.lblQty}: ${item.quantity}
                        </div>
                        <div class="cart-item-price">${labels.currency} ${(item.price * item.quantity).toLocaleString()}</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id}, '${item.size}', '${item.color.hex}')">${labels.lblDelete}</button>
                `;
                cartItemsContainer.appendChild(itemElement);
            });

            cartCount.innerText = totalItems;
            cartTotal.innerText = `${labels.currency} ${total.toLocaleString()}`;
        }

        async function checkout() {
            if (cart.length === 0) {
                alert(labels.msgEmpty);
                return;
            }

            const myPhoneNumber = "9647746855670"; 

            let messageText = labels.whatsappHeader;
            let grandTotal = 0;

            await fetchInventoryFromCloud();

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                grandTotal += itemTotal;
                
                messageText += `${index + 1}. *${item.name}*\n   - Talla: ${item.size}\n   - Color: ${item.color.nameEs}\n   - Cantidad: ${item.quantity}\n   - Precio: ${labels.currency} ${itemTotal.toLocaleString()}\n\n`;
                
                if (baseProductsConfig[item.id]) {
                    baseProductsConfig[item.id].stock = Math.max(0, baseProductsConfig[item.id].stock - item.quantity);
                }
            });

            await saveInventoryToCloud(baseProductsConfig);

            messageText += `---------------------------\n`;
            messageText += `💰 *${labels.lblTotalMsg}* ${labels.currency} ${grandTotal.toLocaleString()}`;

            const whatsappUrl = `https://api.whatsapp.com/send?phone=${myPhoneNumber}&text=${encodeURIComponent(messageText)}`;

            alert(labels.msgSuccess);
            
            window.open(whatsappUrl, '_blank');

            cart = [];
            updateCartUI();
            toggleCart();
            displayProducts(); 
        }

        async function initApp() {
            await fetchInventoryFromCloud();
            displayProducts();
            updateCartUI();
            
            setInterval(async () => {
                await fetchInventoryFromCloud();
                displayProducts();
            }, 15000);
        }

        initApp();
    </script>
</body>
</html>
</html>
