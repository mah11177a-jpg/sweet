<!DOCTYPE html>
<html lang="ar" dir="rtl" id="htmlTag">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruaj | Sports Store</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght=300;400;700;900&family=Poppins:wght=300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #00ff66; 
            --bg-dark: #0b0f19;      
            --card-bg: #161f30;      
            --text-light: #ffffff;
            --text-gray: #a0aec0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        [dir="rtl"] * { font-family: 'Cairo', sans-serif; }
        [dir="ltr"] * { font-family: 'Poppins', sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            overflow-x: hidden;
        }

        header {
            background-color: rgba(22, 31, 48, 0.95);
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .logo span { color: var(--primary-color); }

        .nav-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .lang-select {
            background-color: #1e293b;
            color: white;
            border: 1px solid #334155;
            padding: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            outline: none;
            font-weight: bold;
        }

        .cart-icon-container {
            position: relative;
            cursor: pointer;
            background: #1e293b;
            padding: 10px 20px;
            border-radius: 30px;
            transition: 0.3s;
        }

        .cart-icon-container:hover {
            background: var(--primary-color);
            color: #000;
        }

        .cart-count {
            background: #ff3366;
            color: white;
            border-radius: 50%;
            padding: 2px 8px;
            font-size: 12px;
            position: absolute;
            top: -5px;
            font-weight: bold;
        }
        [dir="rtl"] .cart-count { right: -5px; }
        [dir="ltr"] .cart-count { left: -5px; }

        .hero {
            height: 50vh;
            background: linear-gradient(rgba(11, 15, 25, 0.7), rgba(11, 15, 25, 0.9)), url('https://images.unsplash.com/photo-1517838277536-f5f99be501cd?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80') center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h1 {
            font-size: 42px;
            font-weight: 900;
            margin-bottom: 15px;
        }

        .hero h1 span { color: var(--primary-color); }

        .hero p {
            color: var(--text-gray);
            font-size: 18px;
            max-width: 600px;
            margin-bottom: 30px;
        }

        .container {
            max-width: 1200px;
            margin: 50px auto;
            padding: 0 20px;
        }

        .section-title {
            font-size: 28px;
            margin-bottom: 30px;
            padding: 0 15px;
        }
        [dir="rtl"] .section-title { border-right: 5px solid var(--primary-color); }
        [dir="ltr"] .section-title { border-left: 5px solid var(--primary-color); }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }

        .product-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 255, 102, 0.1);
        }

        .product-img {
            width: 100%;
            height: 300px;
            object-fit: cover;
        }

        .product-info { padding: 20px; }

        .product-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 10px;
            height: 50px;
        }

        .product-price {
            color: var(--primary-color);
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .stock-status {
            font-size: 13px;
            color: var(--text-gray);
            margin-bottom: 12px;
        }

        .selector-group {
            margin-bottom: 15px;
        }

        .selector-group label {
            display: block;
            font-size: 12px;
            color: var(--text-gray);
            margin-bottom: 5px;
        }

        .sizes, .colors {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .size-btn {
            background: #1e293b;
            border: 1px solid #334155;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
        }

        .size-btn.active {
            background: var(--primary-color);
            color: #000;
            border-color: var(--primary-color);
            font-weight: bold;
        }

        /* تنسيق أزرار اختيار الألوان */
        .color-btn {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            border: 2px solid #334155;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s;
        }

        .color-btn.active {
            border-color: #ffffff;
            transform: scale(1.2);
            box-shadow: 0 0 8px var(--primary-color);
        }

        .btn-add {
            width: 100%;
            background-color: var(--primary-color);
            color: #0b0f19;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
            margin-top: 5px;
        }

        .btn-add:disabled {
            background-color: #334155;
            color: var(--text-gray);
            cursor: not-allowed;
        }

        .cart-sidebar {
            position: fixed;
            top: 0;
            width: 400px;
            height: 100%;
            background-color: var(--card-bg);
            box-shadow: 0 0 25px rgba(0,0,0,0.5);
            z-index: 1000;
            transition: all 0.4s ease;
            display: flex;
            flex-direction: column;
        }

        [dir="rtl"] .cart-sidebar { left: -400px; }
        [dir="rtl"] .cart-sidebar.open { left: 0; }
        [dir="ltr"] .cart-sidebar { right: -400px; }
        [dir="ltr"] .cart-sidebar.open { right: 0; }

        .cart-header {
            padding: 20px;
            background-color: #1e293b;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .close-cart {
            font-size: 24px;
            cursor: pointer;
            background: none;
            border: none;
            color: white;
        }

        .cart-items {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .cart-item {
            display: flex;
            gap: 15px;
            background: #1e293b;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 15px;
            align-items: center;
        }

        .cart-item-img {
            width: 70px;
            height: 70px;
            object-fit: cover;
            border-radius: 8px;
        }

        .cart-item-info { flex: 1; }

        .remove-item {
            background: none;
            border: none;
            color: #ff3366;
            cursor: pointer;
        }

        .cart-footer {
            padding: 20px;
            background-color: #1e293b;
            border-top: 1px solid #334155;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .btn-checkout {
            width: 100%;
            background-color: #ff3366;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-size: 16px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            z-index: 999;
        }

        .overlay.active { display: block; }

        @media (max-width: 450px) {
            .cart-sidebar { width: 100%; }
            [dir="rtl"] .cart-sidebar { left: -100%; }
            [dir="ltr"] .cart-sidebar { right: -100%; }
        }
    </style>
</head>
<body>

    <div class="overlay" id="overlay" onclick="toggleCart()"></div>

    <header>
        <div class="logo">RUAJ<span>.</span></div>
        <div class="nav-controls">
            <select class="lang-select" id="langSelect" onchange="changeLanguage(this.value)">
                <option value="ar">العربية</option>
                <option value="es-CO">Español (Colombia)</option>
                <option value="en">English</option>
            </select>
            
            <div class="cart-icon-container" onclick="toggleCart()">
                <span id="lblCartBtn">🛒 السلة</span>
                <span class="cart-count" id="cartCount">0</span>
            </div>
        </div>
    </header>

    <section class="hero">
        <h1 id="lblHeroTitle">انطلق بقوة مع <span>RUAJ</span></h1>
        <p id="lblHeroDesc">ملابس رياضية مصممة بأحدث التقنيات لتمنحك الأداء العالي والراحة المطلقة أثناء التمارين.</p>
    </section>

    <main class="container">
        <h2 class="section-title" id="lblSectionTitle">الأكثر مبيعاً</h2>
        <div class="products-grid" id="productsContainer"></div>
    </main>

    <div class="cart-sidebar" id="cartSidebar">
        <div class="cart-header">
            <h3 id="lblCartHeader">سلة التسوق</h3>
            <button class="close-cart" onclick="toggleCart()">✕</button>
        </div>
        <div class="cart-items" id="cartItemsContainer"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span id="lblTotalText">الإجمالي:</span>
                <span id="cartTotal">COP$ 0</span>
            </div>
            <button class="btn-checkout" id="lblCheckoutBtn" onclick="checkout()">إتمام الطلب</button>
        </div>
    </div>

    <script>
        const translations = {
            ar: {
                dir: "rtl",
                heroTitle: "انطلق بقوة مع <span>RUAJ</span>",
                heroDesc: "ملابس رياضية مصممة بأحدث التقنيات لتمنحك الأداء العالي والراحة المطلقة أثناء التمارين.",
                sectionTitle: "الأكثر مبيعاً",
                cartBtn: "🛒 السلة",
                cartHeader: "سلة التسوق",
                totalText: "الإجمالي:",
                checkoutBtn: "إتمام الطلب عبر الواتساب",
                lblSize: "اختر المقاس:",
                lblColor: "اختر اللون:",
                lblStock: "المتبقي في المخزن:",
                btnAdd: "إضافة للسلة",
                btnOut: "نفدت الكمية",
                currency: "COP$",
                msgMax: "عذراً، لقد وصلت للحد الأقصى المتاح في المخزن لهذا المقاس واللون.",
                msgSuccess: "¡Redirigiendo a WhatsApp para enviar tu pedido!",
                msgEmpty: "السلة فارغة حالياً!",
                lblItemSize: "Talla",
                lblItemColor: "Color",
                lblQty: "Cant",
                lblDelete: "حذف",
                whatsappHeader: "🛍️ *Nuevo Pedido - RUAJ Store* 🛍️\n\n*Productos solicitados:*\n",
                lblTotalMsg: "Total a pagar:",
                products: [
                    { id: 1, name: "Camiseta de Compresión Pro" },
                    { id: 2, name: "Pantalón Deportivo Stretch" },
                    { id: 3, name: "Chaqueta Rompevientos Deportiva" },
                    { id: 4, name: "Tenis RUAJ Ultra Fitness" },
                    { id: 5, name: "Pantalón Deportivo para Niños" }
                ]
            },
            "es-CO": {
                dir: "ltr",
                heroTitle: "Entrena con poder con <span>RUAJ</span>",
                heroDesc: "Ropa deportiva diseñada con la última tecnología para brindarte un alto rendimiento y comodidad absoluta.",
                sectionTitle: "Los Más Vendidos",
                cartBtn: "🛒 Carrito",
                cartHeader: "Tu Carrito",
                totalText: "Total:",
                checkoutBtn: "Pedir por WhatsApp",
                lblSize: "Seleccionar Talla:",
                lblColor: "Seleccionar Color:",
                lblStock: "Disponibles en stock:",
                btnAdd: "Añadir al carrito",
                btnOut: "Agotado",
                currency: "COP$",
                msgMax: "Lo sentimos, has alcanzado el límite máximo disponible en stock para esta talla y color.",
                msgSuccess: "¡Redirigiendo a WhatsApp para enviar tu pedido!",
                msgEmpty: "¡El carrito está vacío!",
                lblItemSize: "Talla",
                lblItemColor: "Color",
                lblQty: "Cant",
                lblDelete: "Eliminar",
                whatsappHeader: "🛍️ *Nuevo Pedido - RUAJ Store* 🛍️\n\n*Productos solicitados:*\n",
                lblTotalMsg: "Total a pagar:",
                products: [
                    { id: 1, name: "Camiseta de Compresión Pro" },
                    { id: 2, name: "Pantalón Deportivo Stretch" },
                    { id: 3, name: "Chaqueta Rompevientos Deportiva" },
                    { id: 4, name: "Tenis RUAJ Ultra Fitness" },
                    { id: 5, name: "Pantalón Deportivo para Niños" }
                ]
            },
            en: {
                dir: "ltr",
                heroTitle: "Move with Power with <span>RUAJ</span>",
                heroDesc: "Sportswear designed with the latest technology to give you high performance and absolute comfort.",
                sectionTitle: "Best Sellers",
                cartBtn: "🛒 Cart",
                cartHeader: "Shopping Cart",
                totalText: "Total:",
                checkoutBtn: "Order via WhatsApp",
                lblSize: "Select Size:",
                lblColor: "Select Color:",
                lblStock: "In Stock:",
                btnAdd: "Add to Cart",
                btnOut: "Out of Stock",
                currency: "COP$",
                msgMax: "Sorry, you have reached the maximum stock limit for this size and color.",
                msgSuccess: "Redirecting to WhatsApp to send your order!",
                msgEmpty: "Your cart is empty!",
                lblItemSize: "Size",
                lblItemColor: "Color",
                lblQty: "Qty",
                lblDelete: "Remove",
                whatsappHeader: "🛍️ *New Order from RUAJ Store* 🛍️\n\n*Items:*\n",
                lblTotalMsg: "Grand Total:",
                products: [
                    { id: 1, name: "Pro Compression T-Shirt" },
                    { id: 2, name: "Comfort Stretch Joggers" },
                    { id: 3, name: "Windproof Sports Jacket" },
                    { id: 4, name: "RUAJ Ultra Fitness Shoes" },
                    { id: 5, name: "Kids Sports Joggers" }
                ]
            }
        };

        // المخزون الافتراضي الأساسي مضاف إليه الألوان للتجربة
        const defaultProductsConfig = {
            1: { price: 75000, image: "https://images.unsplash.com/photo-1581655353564-df123a1eb820?auto=format&fit=crop&w=500&q=80", stock: 5, sizes: ["M", "L", "XL"], colors: [{nameAr: "أسود", nameEs: "Negro", hex: "#000000"}, {nameAr: "أزرق", nameEs: "Azul", hex: "#0000ff"}] },
            2: { price: 105000, image: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?auto=format&fit=crop&w=500&q=80", stock: 3, sizes: ["S", "M", "L"], colors: [{nameAr: "رمادي", nameEs: "Gris", hex: "#808080"}, {nameAr: "أسود", nameEs: "Negro", hex: "#000000"}] },
            3: { price: 145000, image: "https://images.unsplash.com/photo-1544441893-675973e31985?auto=format&fit=crop&w=500&q=80", stock: 2, sizes: ["M", "L", "XXL"], colors: [{nameAr: "أحمر", nameEs: "Rojo", hex: "#ff0000"}, {nameAr: "أخضر زيتوني", nameEs: "Verde Oliva", hex: "#556b2f"}] },
            4: { price: 195000, image: "https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=500&q=80", stock: 4, sizes: ["41", "42", "43", "44"], colors: [{nameAr: "أحمر ناري", nameEs: "Rojo", hex: "#e60000"}, {nameAr: "أبيض", nameEs: "Blanco", hex: "#ffffff"}] },
            5: { price: 15000, image: "https://mah11177a-jpg.github.io/sweet/pants3.jpeg.jpeg", stock: 8, sizes: ["2Y", "3Y", "4Y", "5Y"], colors: [{nameAr: "رمادي غامق", nameEs: "Gris Oscuro", hex: "#343a40"}] }
        };

        function loadInventory() {
            const savedInventory = localStorage.getItem('ruaj_inventory');
            if (savedInventory) {
                return JSON.parse(savedInventory);
            } else {
                localStorage.setItem('ruaj_inventory', JSON.stringify(defaultProductsConfig));
                return defaultProductsConfig;
            }
        }

        function saveInventory(config) {
            localStorage.setItem('ruaj_inventory', JSON.stringify(config));
        }

        let baseProductsConfig = loadInventory();
        let currentLang = 'ar';
        let cart = [];
        let selectedSizes = {};
        let selectedColors = {}; // كائن لحفظ الألوان المحددة لكل منتج

        function changeLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            
            const htmlTag = document.getElementById('htmlTag');
            htmlTag.setAttribute('dir', t.dir);
            htmlTag.setAttribute('lang', lang);

            document.getElementById('lblHeroTitle').innerHTML = t.heroTitle;
            document.getElementById('lblHeroDesc').innerText = t.heroDesc;
            document.getElementById('lblSectionTitle').innerText = t.sectionTitle;
            document.getElementById('lblCartBtn').innerText = t.cartBtn;
            document.getElementById('lblCartHeader').innerText = t.cartHeader;
            document.getElementById('lblTotalText').innerText = t.totalText;
            document.getElementById('lblCheckoutBtn').innerText = t.checkoutBtn;

            displayProducts();
            updateCartUI(); 
        }

        function getCurrentProducts() {
            baseProductsConfig = loadInventory();
            return translations[currentLang].products.map(p => {
                return {
                    ...p,
                    ...baseProductsConfig[p.id]
                };
            });
        }

        function displayProducts() {
            const container = document.getElementById('productsContainer');
            container.innerHTML = '';
            const currentProducts = getCurrentProducts();
            const t = translations[currentLang];

            currentProducts.forEach(product => {
                // ضبط القيم الافتراضية إذا لم يتم اختيارها بعد
                if (!selectedSizes[product.id]) {
                    selectedSizes[product.id] = product.sizes[0];
                }
                if (!selectedColors[product.id] && product.colors && product.colors.length > 0) {
                    selectedColors[product.id] = product.colors[0];
                }

                const isOutOfStock = product.stock === 0;

                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <img src="${product.image}" alt="${product.name}" class="product-img">
                    <div class="product-info">
                        <div class="product-title">${product.name}</div>
                        <div class="product-price">${t.currency} ${product.price.toLocaleString()}</div>
                        <div class="stock-status">${t.lblStock} ${product.stock}</div>
                        
                        <!-- اختيار المقاس -->
                        <div class="selector-group">
                            <label>${t.lblSize}</label>
                            <div class="sizes">
                                ${product.sizes.map(size => `
                                    <button class="size-btn ${selectedSizes[product.id] === size ? 'active' : ''}" 
                                        onclick="selectSize(${product.id}, '${size}')">
                                        ${size}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <!-- اختيار اللون -->
                        <div class="selector-group">
                            <label>${t.lblColor}</label>
                            <div class="colors">
                                ${product.colors.map((color, index) => `
                                    <button class="color-btn ${selectedColors[product.id]?.hex === color.hex ? 'active' : ''}" 
                                        style="background-color: ${color.hex};" 
                                        title="${currentLang === 'ar' ? color.nameAr : color.nameEs}"
                                        onclick="selectColor(${product.id}, ${index})">
                                    </button>
                                `).join('')}
                            </div>
                        </div>

                        <button class="btn-add" ${isOutOfStock ? 'disabled' : ''} onclick="addToCart(${product.id})">
                            ${isOutOfStock ? t.btnOut : t.btnAdd}
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function selectSize(productId, size) {
            selectedSizes[productId] = size;
            displayProducts();
        }

        function selectColor(productId, colorIndex) {
            const currentProducts = getCurrentProducts();
            const product = currentProducts.find(p => p.id === productId);
            if (product && product.colors) {
                selectedColors[productId] = product.colors[colorIndex];
                displayProducts();
            }
        }

        function toggleCart() {
            document.getElementById('cartSidebar').classList.toggle('open');
            document.getElementById('overlay').classList.toggle('active');
        }

        function addToCart(productId) {
            const currentProducts = getCurrentProducts();
            const product = currentProducts.find(p => p.id === productId);
            const size = selectedSizes[productId];
            const color = selectedColors[productId];
            const t = translations[currentLang];

            if (product && product.stock > 0) {
                // البحث في السلة إذا كان نفس المنتج ونفس المقاس ونفس اللون موجوداً بالفعل
                const existingItem = cart.find(item => item.id === productId && item.size === size && item.color.hex === color.hex);

                if (existingItem) {
                    if (existingItem.quantity < product.stock) {
                        existingItem.quantity++;
                    } else {
                        alert(t.msgMax);
                        return;
                    }
                } else {
                    cart.push({
                        id: product.id,
                        name: product.name,
                        price: product.price,
                        image: product.image,
                        size: size,
                        color: color, // حفظ تفاصيل اللون المختار كاملة
                        quantity: 1
                    });
                }
                updateCartUI();
            }
        }

        function removeFromCart(productId, size, colorHex) {
            cart = cart.filter(item => !(item.id === productId && item.size === size && item.color.hex === colorHex));
            updateCartUI();
        }

        function updateCartUI() {
            const cartItemsContainer = document.getElementById('cartItemsContainer');
            const cartCount = document.getElementById('cartCount');
            const cartTotal = document.getElementById('cartTotal');
            const t = translations[currentLang];

            cartItemsContainer.innerHTML = '';
            let total = 0;
            let totalItems = 0;

            cart.forEach(item => {
                total += item.price * item.quantity;
                totalItems += item.quantity;

                // اختيار اسم اللون المناسب حسب لغة التحكم في الواجهة حالياً
                const colorNameDisplay = currentLang === 'ar' ? item.color.nameAr : item.color.nameEs;

                const itemElement = document.createElement('div');
                itemElement.className = 'cart-item';
                itemElement.innerHTML = `
                    <img src="${item.image}" class="cart-item-img">
                    <div class="cart-item-info">
                        <div class="cart-item-title">${item.name}</div>
                        <div class="cart-item-meta">
                            ${t.lblItemSize}: ${item.size} | ${t.lblItemColor}: ${colorNameDisplay} | ${t.lblQty}: ${item.quantity}
                        </div>
                        <div class="cart-item-price">${t.currency} ${(item.price * item.quantity).toLocaleString()}</div>
                    </div>
                    <button class="remove-item" onclick="removeFromCart(${item.id}, '${item.size}', '${item.color.hex}')">${t.lblDelete}</button>
                `;
                cartItemsContainer.appendChild(itemElement);
            });

            cartCount.innerText = totalItems;
            cartTotal.innerText = `${t.currency} ${total.toLocaleString()}`;
        }

        function checkout() {
            const t = translations[currentLang];
            if (cart.length === 0) {
                alert(t.msgEmpty);
                return;
            }

            const myPhoneNumber = "9647746855670"; 

            let messageText = t.whatsappHeader;
            let grandTotal = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * item.quantity;
                grandTotal += itemTotal;
                
                // يتم إرسال اسم اللون بالإسبانية دائماً للعميل الكولومبي بذكاء وثبات ليفهمه
                messageText += `${index + 1}. *${item.name}*\n   - Talla (المقاس): ${item.size}\n   - Color (اللون): ${item.color.nameEs}\n   - Cantidad (الكمية): ${item.quantity}\n   - Precio: ${t.currency} ${itemTotal.toLocaleString()}\n\n`;
                
                if (baseProductsConfig[item.id]) {
                    baseProductsConfig[item.id].stock -= item.quantity;
                }
            });

            saveInventory(baseProductsConfig);

            messageText += `---------------------------\n`;
            messageText += `💰 *${t.lblTotalMsg}* ${t.currency} ${grandTotal.toLocaleString()}`;

            const whatsappUrl = `https://api.whatsapp.com/send?phone=${myPhoneNumber}&text=${encodeURIComponent(messageText)}`;

            alert(t.msgSuccess);
            
            window.open(whatsappUrl, '_blank');

            cart = [];
            updateCartUI();
            toggleCart();
            displayProducts(); 
        }

        changeLanguage('ar');
    </script>
</body>
</html>
